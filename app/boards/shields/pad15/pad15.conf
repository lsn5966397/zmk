# ===========================================================
# 1. 基础设备定义
# ===========================================================

# 键盘显示的蓝牙名称
CONFIG_ZMK_KEYBOARD_NAME="pad15"

# ===========================================================
# 2. 电源管理
# ===========================================================

# 启用软关机/深层休眠功能
CONFIG_ZMK_SLEEP=y

# 进入低功耗休眠状态的超时时间（单位：毫秒，这里设置为 5 分钟）
# 在此状态下，蓝牙依然连接，但功耗降低
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# 进入“完全断开蓝牙”的深度休眠时间（单位：毫秒，这里设置为 10 分钟）
# 唤醒时可能需要 1-2 秒重新连接蓝牙，但极度省电
CONFIG_ZMK_IDLE_TIMEOUT=600000

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y # 增强蓝牙发射功率（解决分体键盘信号被金属外壳遮挡或连接不稳的问题）范围：-20 到 8，建议设为 8
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n # 关闭蓝牙 GATT 订阅的强制执行
CONFIG_ZMK_BATTERY_REPORTING=y # 开启电池电量报告

# ===========================================================
# 3. 硬件功能模块开启
# ===========================================================

# 开启旋转编码器（EC11）支持
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 开启鼠标模拟功能（必须开启才能使用摇杆控制鼠标或模拟滚轮）
CONFIG_ZMK_MOUSE=y
# 启用 ADC 和模拟输入
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y

# 启用摇杆驱动
CONFIG_ANALOG_INPUT=y

# 开启背光控制
CONFIG_ZMK_BACKLIGHT=y

# ZMK 鼠标指针支持（必须）
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# 允许通过 USB 和 蓝牙 同时输出（插线优先）
CONFIG_ZMK_USB=y
# 启用蓝牙低功耗 (BLE) 连接
CONFIG_ZMK_BLE=y

CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y   # 开启全键无冲N-Key Rollover
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y  # 开启实验性蓝牙连接算法
CONFIG_KSCAN=n

# ===========================================================
# 4. RGB 背光与灯效控制 (WS2812)
# ===========================================================

# 启用外部设备供电控制（如果你的主控板有 VCC 控制引脚，设为 y 可以更省电）
CONFIG_ZMK_EXT_POWER=y

# 启用 RGB 底灯/背光支持
CONFIG_ZMK_RGB_UNDERGLOW=y

# --- RGB 默认行为设置 ---
# 0: 固定颜色, 1: 呼吸, 2: 颜色循环, 3: 波动
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# 设置 RGB 底灯开机时的初始色相（Hue）值
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# 默认亮度 (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
# 每次调节亮度的步长（百分比）
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
# 默认速度 (1-5)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=2

# 断开蓝牙或进入休眠时，是否自动关闭灯效
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# ===========================================================
# 5. 进阶与调试设置 (新手建议先保持默认)
# ===========================================================

# 开启 ZMK Studio 支持（如果你想用 GUI 软件实时改键，需要开启此项）
# 注意：这会占用额外的固件空间
CONFIG_ZMK_STUDIO=y

# 启用日志功能（仅在调试硬件不触发时开启，通过串口查看报错）
# CONFIG_ZMK_USB_LOGGING=y
